<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Cafe - Edward</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <form id="loginForm">
            <h2>Login Staf Cafe</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="admin@kopi.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="******">
            </div>
            <button type="submit">Login Sekarang</button>
            <p id="message"></p>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
